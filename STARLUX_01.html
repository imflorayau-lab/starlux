<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件及影像掃描系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* ══ RESET & BASE ══ */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  /* ── 三大主色 ── */
  --brn:#825b42;   /* 暖棕：主要按鈕、強調色 */
  --olive:#777435; /* 橄欖：次要強調、圖示 */
  --dk:#2e3d45;    /* 深青灰：標題列、頁首 */

  /* ── 衍生色 ── */
  --brn2:#6e4c37;          /* 暖棕深：hover */
  --mid:#3d5060;           /* 深青灰中：次層背景 */
  --cream:#e8d9c8;         /* 米白：深色背景上的文字 */
  --tan:#c9b99a;           /* 淡棕：副文字 */

  /* ── 背景 & 卡片（淺色系） ── */
  --bg:#f5f2ee;            /* 頁面背景：極淡暖米 */
  --bg2:#edeae4;           /* 次要背景 */
  --card:#ffffff;          /* 卡片白 */
  --card2:#faf8f5;         /* 輸入框背景 */

  /* ── 邊框 ── */
  --bd:#ddd8d0;
  --bd2:#ece8e1;

  /* ── 文字 ── */
  --txt:#1e1e1b;
  --txt2:#5a5650;

  /* ── 功能色 ── */
  --green-bg:#eaf5ef;--green-bd:#b0d8b8;--green-txt:#27500a;
  --warn-bg:#fdf5e8;--warn-bd:#f0c090;--warn-txt:#854f0b;
  --err:#c04020;
  --locked:#ebe8e2;
  --local-bg:#e6f0e8;--local-bd:#a8d4b0;--local-txt:#1f5c2a;
}
body{font-family:Arial,'Microsoft JhengHei','微軟正黑體',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}

/* ══ APP SHELL ══ */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:520px;margin:0 auto;background:var(--bg);position:relative;box-shadow:0 0 40px rgba(46,61,69,0.10);}

/* ══ SCREEN VISIBILITY ══ */
.hidden{display:none!important;}

/* ══ LOGIN ══ */
.s-login{min-height:100vh;background:linear-gradient(160deg,var(--dk) 0%,#1a282f 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;}
.login-logo{text-align:center;margin-bottom:2.5rem;}
.login-logo-icon{width:72px;height:72px;background:rgba(119,116,53,0.25);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.login-logo-icon i{font-size:38px;color:var(--olive);}
.login-sysname{color:var(--cream);font-size:20px;font-weight:700;letter-spacing:1px;}
.login-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:2rem 1.5rem;width:100%;max-width:360px;}
.login-hint{color:rgba(200,185,170,0.7);font-size:13px;text-align:center;margin-bottom:1.5rem;}
.lf{margin-bottom:14px;}
.lf label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tan);font-weight:600;margin-bottom:6px;letter-spacing:0.5px;}
.lf label i{font-size:14px;}
.lf-wrap{position:relative;}
.lf input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:var(--cream);font-size:15px;outline:none;transition:border-color .15s;}
.lf input:focus{border-color:var(--brn);background:rgba(255,255,255,0.11);}
.lf input::placeholder{color:rgba(200,185,170,0.35);}
.lf-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(200,185,170,0.4);font-size:18px;padding:4px;display:flex;align-items:center;}
.lf-eye:hover{color:var(--tan);}
.login-err{background:rgba(192,64,32,0.15);border:1px solid rgba(192,64,32,0.3);border-radius:8px;padding:8px 12px;color:#f08080;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.btn-login{width:100%;padding:14px;background:var(--brn);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;}
.btn-login:hover{background:var(--brn2);}
.btn-login i{font-size:20px;}
.login-footer{color:rgba(100,120,130,0.6);font-size:12px;margin-top:2rem;text-align:center;}

/* ══ HEADER ══ */
.hdr{background:var(--dk);height:52px;display:flex;align-items:center;padding:0 12px;gap:8px;border-bottom:2.5px solid var(--olive);flex-shrink:0;position:sticky;top:0;z-index:100;}
.hdr-back{background:none;border:none;color:#a0b8c4;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:background .15s;}
.hdr-back:hover{background:rgba(255,255,255,0.1);}
.hdr-title{flex:1;color:var(--cream);font-size:15px;font-weight:700;background:none;border:none;text-align:left;padding:0;cursor:pointer;transition:opacity .15s;}
.hdr-title:hover{opacity:.75;}
.hdr-icon{color:var(--olive);font-size:22px;}

/* ══ HOME ══ */
.s-home{flex:1;display:flex;flex-direction:column;}
.home-topbar{background:var(--mid);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.home-user{display:flex;align-items:center;gap:10px;}
.home-avatar{width:34px;height:34px;background:var(--brn);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;flex-shrink:0;}
.home-uname{color:var(--cream);font-size:13px;font-weight:700;}
.home-urole{color:var(--tan);font-size:11px;}
.btn-logout{background:none;border:1px solid rgba(255,255,255,0.18);border-radius:7px;color:var(--tan);font-size:12px;padding:5px 10px;display:flex;align-items:center;gap:5px;}
.btn-logout:hover{background:rgba(255,255,255,0.08);color:var(--cream);}
.home-body{flex:1;padding:1.25rem 1rem;display:flex;flex-direction:column;gap:14px;}
.home-greet{text-align:center;padding:0.25rem 0 0.5rem;}
.home-greet-t{font-size:15px;font-weight:700;color:var(--dk);}
.home-fn-btn{width:100%;border:none;border-radius:18px;padding:1.75rem 1.25rem;display:flex;flex-direction:column;align-items:center;gap:14px;transition:all .18s;position:relative;overflow:hidden;}
.home-fn-btn:active{transform:scale(.98);}
.home-fn-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s;}
.home-fn-btn:hover::after{background:rgba(255,255,255,0.08);}
.fn-seal{background:linear-gradient(145deg,#2e3d45,#3d5060);}
.fn-open{background:linear-gradient(145deg,#3b5e2b,#4e7a3a);}
.fn-arch{background:linear-gradient(145deg,#825b42,#9c6e50);}
.home-fn-ico{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;}
.home-fn-ico i{font-size:36px;color:#fff;}
.home-fn-name{font-size:22px;font-weight:800;color:#fff;}
.home-fn-desc{font-size:12px;color:rgba(255,255,255,0.65);text-align:center;line-height:1.5;}
.home-foot{color:#aaa;font-size:11px;text-align:center;padding:.75rem;}

/* ══ SUB HEADER + STEP BAR ══ */
.s-sub{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.stepbar{display:flex;background:var(--mid);flex-shrink:0;}
.step{flex:1;padding:8px 4px;text-align:center;font-size:11px;color:#7a9aaa;border-bottom:3px solid transparent;font-weight:600;}
.step i{font-size:14px;display:block;margin-bottom:2px;}
.step.active{color:var(--cream);border-bottom-color:var(--brn);background:var(--dk);}
.step.done{color:#a0c4a0;border-bottom-color:var(--olive);}
.sub-body{flex:1;overflow-y:auto;padding:1rem;background:var(--bg);}

/* ══ MENU SCREENS ══ */
.s-menu{flex:1;overflow-y:auto;background:var(--bg);}
.menu-body{padding:1rem;}
.menu-section{margin-bottom:1.25rem;}
.msec-hd{background:var(--brn);color:#f5ede3;font-size:14px;font-weight:700;padding:11px 16px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:8px;}
.msec-hd i{font-size:17px;}
.msec-body{background:var(--card);border:0.5px solid var(--bd);border-radius:0 0 12px 12px;overflow:hidden;}
.mitem{display:flex;align-items:center;gap:12px;padding:15px 16px;width:100%;background:none;border:none;text-align:left;font-size:15px;color:var(--txt);border-bottom:.5px solid var(--bd2);transition:background .12s;}
.mitem:last-child{border-bottom:none;}
.mitem:hover{background:#edeae4;}
.mitem i.mico{font-size:20px;color:var(--olive);}
.mitem-txt{flex:1;}
.mitem-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;}
.badge-photo{background:#e8f0eb;color:#3b6d11;}
.badge-label{background:#f3ece4;color:#6b4530;}
.mitem-arr{color:#ccc;font-size:17px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:12px;}
.tile{border-radius:10px;padding:16px 8px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;border:none;width:100%;transition:all .15s;}
.tile i{font-size:26px;}
.tile-name{font-size:13px;font-weight:700;text-align:center;line-height:1.3;}
.tile-photo{background:#e9ede8;color:var(--dk);border:1.5px solid #bcc8b8;}
.tile-photo:hover{background:#d8e4d4;}
.tile-label{background:#f2ebe3;color:var(--brn2);border:1.5px solid #cdb8a4;}
.tile-label:hover{background:#e6d3c2;}
.tile-arch{background:#f4f0ea;color:var(--dk);border:1.5px solid #ccc6bc;}
.tile-arch:hover{background:#ece4d8;border-color:var(--brn);}
.tile:active{transform:scale(.97);}
.menu-foot{color:#aaa;font-size:11px;text-align:center;padding:.75rem;}

/* ══ CARDS & FIELDS ══ */
.card{background:var(--card);border:.5px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.card-hd{background:var(--brn);color:#f5ede3;font-size:14px;font-weight:700;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.card-hd-l{display:flex;align-items:center;gap:8px;}
.card-hd i{font-size:17px;}
.card-bd{padding:1rem;}
.field{margin-bottom:13px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;font-size:12px;color:#5a4535;font-weight:700;margin-bottom:5px;}
.req{color:var(--err);margin-left:2px;}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:.5px solid #c0b8ac;border-radius:8px;font-size:15px;color:var(--txt);background:var(--card2);}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brn);background:#fff;}
.field textarea{resize:vertical;line-height:1.6;}
.field-local input{background:var(--local-bg);color:var(--local-txt);border-color:var(--local-bd);cursor:not-allowed;}
.field-locked input{background:var(--locked);color:#888;border-color:var(--bd);cursor:not-allowed;}
.field-blank input{background:var(--locked);color:#aaa;border-color:var(--bd);cursor:not-allowed;}
.tag-local{display:inline-block;background:var(--dk);color:var(--cream);font-size:10px;padding:1px 7px;border-radius:8px;margin-left:4px;font-weight:600;vertical-align:middle;}
.tag-blank{display:inline-block;background:var(--bd);color:#666;font-size:10px;padding:1px 7px;border-radius:8px;margin-left:4px;font-weight:600;vertical-align:middle;}
.tag-req{display:inline-block;background:var(--local-bg);color:var(--local-txt);font-size:10px;padding:1px 7px;border-radius:8px;margin-left:4px;font-weight:600;vertical-align:middle;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.char-count{font-size:11px;color:#999;text-align:right;margin-top:3px;}
.char-over{color:var(--err);}
.hint{font-size:11px;color:#999;margin-top:4px;}
.divider{font-size:11px;color:var(--olive);font-weight:700;margin:4px 0 12px;display:flex;align-items:center;gap:8px;}
.divider::after{content:'';flex:1;height:.5px;background:var(--bd);}

/* ══ BUTTONS ══ */
.btn-p{width:100%;padding:14px;background:var(--brn);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-p:hover{background:var(--brn2);}
.btn-p i{font-size:19px;}
.btn-s{width:100%;padding:13px;background:var(--card);color:var(--dk);border:1.5px solid var(--dk);border-radius:8px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.btn-s:hover{background:var(--bg2);}
.btn-s i{font-size:18px;}
.btn-lk{padding:10px 14px;background:var(--dk);color:var(--cream);border:none;border-radius:8px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.btn-lk:hover{background:var(--mid);}

/* ══ SHOP BUTTONS ══ */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.shop-btn{padding:14px 8px;border:1.5px solid var(--bd);border-radius:10px;background:var(--card2);display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;border:1.5px solid var(--bd);}
.shop-btn.selected{border-color:var(--brn);background:#f3ece4;}
.shop-btn:hover{border-color:var(--brn);background:#fdf6f0;}
.shop-code{font-size:18px;font-weight:700;color:var(--brn);}
.shop-name{font-size:11px;color:#777;text-align:center;line-height:1.3;}

/* ══ MODE TOGGLE ══ */
.mode-toggle{display:grid;grid-template-columns:1fr 1fr;border:1.5px solid var(--brn);border-radius:10px;overflow:hidden;}
.mode-btn{padding:13px 8px;border:none;font-size:13px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);color:var(--brn);}
.mode-btn i{font-size:19px;}
.mode-btn.active{background:var(--brn);color:#fff;}
.mode-btn:hover:not(.active){background:var(--card2);}
.mode-sub{font-size:10px;font-weight:400;opacity:.8;}

/* ══ UPLOAD ══ */
.upload-zone{border:2px dashed #b0a898;border-radius:10px;padding:1.5rem 1rem;text-align:center;background:var(--card2);cursor:pointer;transition:all .15s;}
.upload-zone:hover{border-color:var(--brn);background:#fdf6f0;}
.upload-zone i{font-size:34px;color:var(--brn);display:block;margin-bottom:8px;}
.upload-zone p{font-size:14px;color:var(--olive);font-weight:700;}
.upload-zone span{font-size:12px;color:#999;}
.file-list{margin-top:10px;}
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:8px;margin-bottom:6px;border:.5px solid var(--bd);}
.fi-ico{font-size:17px;color:var(--olive);}
.fi-name{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fi-size{font-size:11px;color:#999;flex-shrink:0;}
.fi-del{background:none;border:none;color:var(--err);font-size:16px;padding:2px;display:flex;align-items:center;}

/* ══ RECORD SUMMARY ══ */
.rec-sum{background:var(--bg2);border:.5px solid var(--bd);border-radius:8px;padding:10px 14px;margin-bottom:12px;}
.rec-sum table{width:100%;font-size:13px;border-collapse:collapse;}
.rec-sum td{padding:3px 2px;vertical-align:top;}
.rec-sum td:first-child{color:#777;width:95px;}
.rec-sum td:last-child{font-weight:700;}

/* ══ RESULT / ERROR ══ */
.success-box{background:var(--green-bg);border:1px solid var(--green-bd);border-radius:10px;padding:1.25rem;text-align:center;margin-bottom:1rem;}
.success-box i{font-size:40px;color:#3b6d11;display:block;margin-bottom:8px;}
.success-box p{font-size:15px;font-weight:700;color:var(--green-txt);}
.success-box span{font-size:13px;color:#5a8060;}
.err-msg{color:var(--err);font-size:13px;padding:0 0 10px;display:flex;align-items:center;gap:6px;}
.err-msg i{font-size:16px;flex-shrink:0;}
.not-found{border:1px solid var(--warn-bd);border-radius:10px;background:var(--warn-bg);padding:12px 14px;margin-top:10px;font-size:13px;color:var(--warn-txt);display:flex;align-items:flex-start;gap:8px;}
.not-found i{font-size:16px;flex-shrink:0;margin-top:1px;}
.result-card{border:1px solid var(--local-bd);border-radius:10px;background:var(--green-bg);padding:12px 14px;margin-top:10px;}
.rc-lbl{font-size:11px;color:#3b6d11;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.rc-row{display:flex;gap:10px;margin-bottom:6px;}
.rc-row:last-child{margin-bottom:0;}
.rc-fld{flex:1;}
.rc-fl{font-size:11px;color:#5a8060;margin-bottom:2px;}
.rc-fv{font-size:14px;font-weight:700;color:var(--green-txt);background:#fff;border:.5px solid var(--local-bd);border-radius:6px;padding:7px 10px;}

/* ══ TABLE LIST ══ */
.tbl-wrap{overflow-x:auto;}
table.lst{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
table.lst th{background:var(--bg);color:#5a4535;font-weight:700;padding:8px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;}
table.lst td{padding:9px 8px;border-bottom:.5px solid var(--bd2);vertical-align:middle;word-break:break-all;}
table.lst tr:last-child td{border-bottom:none;}
table.lst tr.sel-row{background:#f2ebe3;}
table.lst tr:not(.sel-row):hover{background:var(--bg2);cursor:pointer;}
.chk-col{width:34px;text-align:center;}
.chk{width:19px;height:19px;accent-color:var(--brn);cursor:pointer;}
.sel-bar{background:var(--card2);border-top:1px solid var(--bd);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--brn);}
.cnt-badge{font-size:11px;color:#c9b99a;background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px;}
.filter-bar{padding:10px 12px;border-bottom:.5px solid var(--bd2);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:4px 11px;border:.5px solid #c0b8ac;border-radius:14px;font-size:11px;background:var(--card);color:var(--txt2);font-weight:600;}
.filter-btn.active{background:var(--brn);color:#fff;border-color:var(--brn);}

/* ══ PREVIEW / BARCODE ══ */
.preview-box{background:var(--card);border:1px solid var(--bd);box-shadow:0 1px 4px rgba(46,61,69,0.06);border-radius:10px;padding:1.25rem;margin-bottom:1rem;}
.preview-lbl{font-size:12px;color:var(--olive);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.bc-area{background:#fff;border:1.5px solid var(--dk);border-radius:6px;padding:1.25rem;text-align:center;margin-bottom:12px;}
.bc-no{font-size:11px;font-family:Arial,monospace;color:var(--dk);letter-spacing:1px;font-weight:700;margin-top:8px;word-break:break-all;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.info-item{background:var(--bg2);border-radius:6px;padding:7px 10px;}
.ii-l{font-size:10px;color:#777;margin-bottom:2px;}
.ii-v{font-size:12px;font-weight:700;word-break:break-all;}
.info-full{grid-column:1/-1;}

/* ══ GROUP BOX ══ */
.group-box{border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:12px;background:var(--card2);}
.group-box:last-child{margin-bottom:0;}
.group-lbl{font-size:12px;color:var(--brn);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.group-note{font-size:12px;color:var(--txt2);background:var(--bg2);border-radius:6px;padding:6px 10px;margin-bottom:10px;display:flex;align-items:flex-start;gap:5px;}
.wo-row{display:flex;gap:8px;align-items:flex-end;}
.wo-row input{flex:1;}

/* ══ TAB BAR (for label query/list) ══ */
.inner-tabs{display:flex;background:var(--dk);margin:-1rem -1rem 1rem;border-bottom:2px solid var(--olive);}
.itab{flex:1;padding:0;border:none;background:transparent;}
.itab-inner{display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 8px;font-size:13px;font-weight:700;color:#7a9aaa;border-bottom:3px solid transparent;}
.itab.active .itab-inner{color:var(--cream);border-bottom-color:var(--brn);background:var(--dk);}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function el(id){return document.getElementById(id);}
function val(id){return(el(id)||{value:''}).value;}
function show(id){var e=el(id);if(e)e.classList.remove('hidden');}
function hide(id){var e=el(id);if(e)e.classList.add('hidden');}
function showErr(eid,mid,msg){show(eid);el(mid).textContent=msg;}
function hideErr(id){hide(id);}
function fmtSz(n){return n<1024?n+'B':n<1048576?Math.round(n/1024)+'KB':(n/1048576).toFixed(1)+'MB';}
function setOpts(sid,opts,ph){var s=el(sid);if(!s)return;s.innerHTML='<option value="">'+ph+'</option>';opts.forEach(function(o){s.innerHTML+='<option value="'+o+'">'+o+'</option>';});}

function renderBarcode(svgId,noId,v){
  var svg=el(svgId);if(!svg)return;
  var pat=[];for(var i=0;i<v.length;i++){var c=v.charCodeAt(i);pat.push((c%3)+2,(c%5)+1,(c%4)+1,(c%2)+1);}
  var tot=pat.reduce(function(a,b){return a+b;},0),x=10,u=240/tot,bars='';
  for(var j=0;j<pat.length;j++){var w=pat[j]*u;if(j%2===0)bars+='<rect x="'+x.toFixed(2)+'" y="4" width="'+Math.max(w-.8,.8).toFixed(2)+'" height="52" fill="#2e3d45"/>';x+=w;}
  svg.innerHTML=bars;
  el(noId).textContent=v.replace(/\|/g,' | ');
}

function renderFiles(listId,files,rmFn){
  var l=el(listId);if(!l)return;
  l.innerHTML=files.map(function(f,i){
    var ico=f.type==='application/pdf'?'ti-file-type-pdf':'ti-photo';
    return '<div class="file-item"><i class="ti '+ico+' fi-ico"></i><span class="fi-name">'+f.name+'</span><span class="fi-size">'+fmtSz(f.size)+'</span><button class="fi-del" onclick="'+rmFn+'('+i+')"><i class="ti ti-x"></i></button></div>';
  }).join('');
}

function infoGrid(items){
  return items.map(function(it){
    return '<div class="info-item'+(it.full?' info-full':'')+'"><div class="ii-l">'+it.l+'</div><div class="ii-v">'+it.v+'</div></div>';
  }).join('');
}

function noteCount(taId,cntId,max){
  var ta=el(taId);if(!ta)return;
  var txt=ta.value,cjk=(txt.match(/[\u4e00-\u9fff\u3400-\u4dbf\uff00-\uffef]/g)||[]).length;
  var nc=txt.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uff00-\uffef]/g,'').length;
  var tot=cjk+Math.ceil(nc/2);
  if(tot>max){var r='',cnt=0;for(var i=0;i<txt.length;i++){var c=txt[i],cjkc=/[\u4e00-\u9fff]/.test(c);cnt+=cjkc?1:.5;if(cnt>max)break;r+=c;}ta.value=r;tot=max;}
  var ce=el(cntId);if(!ce)return;
  ce.textContent=tot+' / '+max+' 字';ce.className='char-count'+(tot>=max?' char-over':'');
}

function togglePwd(){

function doLogin(){
  var u=val('f-user').trim(),p=val('f-pass');
  var b=el('btn-login'),e=el('login-err');
  if(!u||!p){show('login-err');e.innerHTML='<i class="ti ti-alert-circle"></i>請輸入帳號與密碼';return;}
  b.innerHTML='<i class="ti ti-loader-2" style="animation:spin 1s linear infinite;font-size:20px;"></i> 登入中...';

      CUR_USER={name:u,ini:u.charAt(0).toUpperCase()};

function doLogout(){

// NAVIGATION
// ══════════════════════════════════════════════
var CUR='home'; // current screen key
var PARENT={}; // parent screen for each screen key

function allScreens(){return['s-login','s-home','s-seal','s-open','s-archive','s-sub'];}

function showOnly(id){
  allScreens().forEach(hide);
  show(id);
  if(id==='s-home'){hide('main-hdr');}
  else{show('main-hdr');}
}

function setHdr(title,icon,showBack){
  el('hdr-title').textContent=title||'文件及影像掃描系統';
  el('hdr-icon').className='ti '+(icon||'ti-scan')+' hdr-icon';
  if(showBack){show('btn-back');}else{hide('btn-back');}
}

function setSteps(steps,active){
  var sb=el('stepbar');
  sb.innerHTML=steps.map(function(s,i){
    var cls=i+1===active?'active':i+1<active?'done':'';
    return '<div class="step '+cls+'"><i class="ti '+s.icon+'"></i>'+s.label+'</div>';
  }).join('');
}

function goStep(n){
  var divs=el('stepbar').querySelectorAll('.step');
  divs.forEach(function(d,i){d.className='step'+(i+1===n?' active':i+1<n?' done':'');});
}

function goToHome(){
  CUR='home';
  showOnly('s-home');
  el('s-home').style.display='flex';
}

function goFunc(fn){
  hide('s-home');show('main-hdr');
  if(fn==='seal'){
    CUR='seal';PARENT['seal']='home';
    setHdr('封箱','ti-package-export',true);
    showOnly('s-seal');show('main-hdr');
  } else if(fn==='open'){
    CUR='open';PARENT['open']='home';
    setHdr('拆箱','ti-package-import',true);
    showOnly('s-open');show('main-hdr');
  } else if(fn==='archive'){
    CUR='archive';PARENT['archive']='home';
    setHdr('歸檔標籤製作','ti-printer',true);
    showOnly('s-archive');show('main-hdr');
  }
}

function nav(screen){
  var prev=CUR;
  CUR=screen;
  PARENT[screen]=prev;
  showOnly('s-sub');show('main-hdr');show('btn-back');
  el('sub-body').innerHTML='';
  el('stepbar').innerHTML='';
  renderScreen(screen);
}

function navBack(){
  var p=PARENT[CUR]||'home';
  CUR=p;
  if(p==='home'){goToHome();}
  else if(p==='seal'){setHdr('封箱','ti-package-export',true);showOnly('s-seal');show('main-hdr');}
  else if(p==='open'){setHdr('拆箱','ti-package-import',true);showOnly('s-open');show('main-hdr');}
  else if(p==='archive'){setHdr('歸檔標籤製作','ti-printer',true);showOnly('s-archive');show('main-hdr');}
  else{nav(p);}
}

window.spSubmit=function(){

var SL={sel:[],tab:'query',qr:[]};
function renderSealLabel(){
  setHdr('文件歸檔標籤印製 — 外運','ti-printer',true);
  setSteps([{icon:'ti-list-check',label:'選擇項目'},{icon:'ti-plane-departure',label:'AWB'},{icon:'ti-barcode',label:'預覽'},{icon:'ti-check',label:'完成'}],1);
  SL.sel=[];
  el('sub-body').innerHTML=
    '<div class="inner-tabs">'+
      '<button class="itab active" id="sl-tq" onclick="slTab(\'query\')"><div class="itab-inner"><i class="ti ti-search" style="font-size:16px;"></i>查詢</div></button>'+
      '<button class="itab" id="sl-tl" onclick="slTab(\'list\')"><div class="itab-inner"><i class="ti ti-list-check" style="font-size:16px;"></i>外運待列印清單</div></button>'+
    '</div>'+
    '<div id="sl-q-panel"></div>'+
    '<div id="sl-l-panel" class="hidden"></div>';
  slTab('query');
}
window.slTab=function(t){
  SL.tab=t;
  ['query','list'].forEach(function(x){
    var on=x===t;
    el('sl-t'+(x==='query'?'q':'l')).classList.toggle('active',on);
  });
  if(t==='query'){
    show('sl-q-panel');hide('sl-l-panel');
    el('sl-q-panel').innerHTML=slQueryHTML();
    el('f-sldate').value=today;
  } else {
    hide('sl-q-panel');show('sl-l-panel');
    el('sl-l-panel').innerHTML=slListHTML();
    slRenderTable();
  }
};
function slQueryHTML(){
  return '<div class="card"><div class="card-hd"><div class="card-hd-l"><i class="ti ti-search"></i>查詢條件</div></div><div class="card-bd">'+
    '<div class="field"><label>拍攝日</label><input type="date" id="f-sldate"></div>'+
    '<div class="field"><label>Invoice NO</label><input type="text" id="f-slinv" placeholder="Invoice 號碼"></div>'+
    '<div class="row2"><div class="field"><label>Line</label><input type="text" id="f-slln" placeholder="例：L01"></div><div class="field"><label>PN</label><input type="text" id="f-slpn" placeholder="零件編號"></div></div>'+
    '<div class="field"><label>SN</label><input type="text" id="f-slsn" placeholder="序號"></div>'+
    '</div></div>'+
    '<button class="btn-p" onclick="slQuery()" style="margin-bottom:10px;"><i class="ti ti-search"></i>查詢</button>'+
    '<button class="btn-s" style="margin-top:0;" onclick="slClear()"><i class="ti ti-refresh"></i>清除條件</button>'+
    '<div id="sl-qr" style="margin-top:14px;"></div>';
}
window.slQuery=function(){
  var d=val('f-sldate'),inv=val('f-slinv').trim().toLowerCase(),
      ln=val('f-slln').trim().toLowerCase(),pn=val('f-slpn').trim().toLowerCase(),
      sn=val('f-slsn').trim().toLowerCase();
  var res=SEAL_REC.filter(function(r){
    if(d&&r.date!==d)return false;
    if(inv&&r.invoice.toLowerCase().indexOf(inv)<0)return false;
    if(ln&&r.line.toLowerCase().indexOf(ln)<0)return false;
    if(pn&&r.pn.toLowerCase().indexOf(pn)<0)return false;
    if(sn&&r.sn.toLowerCase().indexOf(sn)<0)return false;
    return true;
  });
  var qr=el('sl-qr');
  if(!res.length){qr.innerHTML='<div class="not-found"><i class="ti ti-search-off"></i>查無符合條件的記錄</div>';return;}
  var rows=res.map(function(r){return'<tr><td>'+r.date+'</td><td style="font-size:11px">'+r.invoice+'</td><td>'+r.line+'</td><td style="font-size:11px">'+r.pn+'</td><td style="font-size:11px">'+(r.sn||'—')+'</td></tr>';}).join('');
  qr.innerHTML='<div class="card"><div class="card-hd"><div class="card-hd-l"><i class="ti ti-table"></i>查詢結果</div><span class="cnt-badge">共 '+res.length+' 筆</span></div><div class="tbl-wrap"><table class="lst"><thead><tr><th style="width:78px">拍攝日</th><th style="width:110px">Invoice NO</th><th style="width:50px">Line</th><th style="width:90px">PN</th><th style="width:90px">SN</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
};
window.slClear=function(){
  ['f-sldate','f-slinv','f-slln','f-slpn','f-slsn'].forEach(function(id){var e=el(id);if(e)e.value='';});
  if(el('f-sldate'))el('f-sldate').value=today;
  var q=el('sl-qr');if(q)q.innerHTML='';
};
function slListHTML(){
  return '<div class="card"><div class="card-hd"><div class="card-hd-l"><i class="ti ti-list-check"></i>外運待列印清單</div><span class="cnt-badge" id="sl-sel-hd">已選 0 筆</span></div>'+
    '<div class="tbl-wrap"><table class="lst"><thead><tr><th class="chk-col"><input type="checkbox" class="chk" id="sl-chk-all" onchange="slToggleAll(this)"></th><th style="width:78px">拍攝日</th><th style="width:110px">Invoice</th><th style="width:50px">Line</th><th style="width:90px">PN</th><th style="width:90px">SN</th></tr></thead><tbody id="sl-tbody"></tbody></table></div>'+
    '<div class="sel-bar"><span id="sl-sel-info">請勾選需要列印標籤的項目</span></div></div>'+
    '<div id="sl-err" class="err-msg hidden"><i class="ti ti-alert-circle"></i><span id="sl-err-m"></span></div>'+
    '<button class="btn-p" onclick="slGoAWB()"><i class="ti ti-arrow-right"></i>確認選取，輸入 AWB</button>';
}
function slRenderTable(){
  var tb=el('sl-tbody');if(!tb)return;
  tb.innerHTML=SEAL_REC.map(function(r,i){
    var chk=SL.sel.indexOf(i)>=0;
    return '<tr class="'+(chk?'sel-row':'')+'" onclick="slToggle('+i+')" id="sl-row-'+i+'">'+
      '<td class="chk-col" onclick="event.stopPropagation()"><input type="checkbox" class="chk" id="sl-c-'+i+'" '+(chk?'checked':'')+' onchange="slToggle('+i+')"></td>'+
      '<td>'+r.date+'</td><td style="font-size:11px">'+r.invoice+'</td><td>'+r.line+'</td><td style="font-size:11px">'+r.pn+'</td><td style="font-size:11px">'+(r.sn||'—')+'</td>'+
    '</tr>';
  }).join('');
  slUpdateUI();
}
window.slToggle=function(i){var idx=SL.sel.indexOf(i);if(idx>=0)SL.sel.splice(idx,1);else SL.sel.push(i);var c=el('sl-c-'+i),r=el('sl-row-'+i);if(c)c.checked=SL.sel.indexOf(i)>=0;if(r)r.className=SL.sel.indexOf(i)>=0?'sel-row':'';slUpdateUI();};
window.slToggleAll=function(cb){SL.sel=cb.checked?SEAL_REC.map(function(_,i){return i;}).slice():[];SEAL_REC.forEach(function(_,i){var c=el('sl-c-'+i),r=el('sl-row-'+i);if(c)c.checked=cb.checked;if(r)r.className=cb.checked?'sel-row':'';});slUpdateUI();};
function slUpdateUI(){var n=SL.sel.length;if(el('sl-sel-hd'))el('sl-sel-hd').textContent='已選 '+n+' 筆';if(el('sl-sel-info'))el('sl-sel-info').textContent=n?'已選取 '+n+' 筆':'請勾選需要列印標籤的項目';var ca=el('sl-chk-all');if(ca){ca.checked=n===SEAL_REC.length&&n>0;ca.indeterminate=n>0&&n<SEAL_REC.length;}}
window.slGoAWB=function(){
  if(!SL.sel.length){showErr('sl-err','sl-err-m','請至少選取一筆');return;}
  hideErr('sl-err');goStep(2);
  el('sub-body').innerHTML='<div class="card"><div class="card-hd"><div class="card-hd-l"><i class="ti ti-plane-departure"></i>AWB 資料輸入</div></div><div class="card-bd"><div class="field" style="margin-bottom:0"><label>AWB No.<span class="req">*</span></label><input type="text" id="f-awb" placeholder="例：176-12345678"><div class="hint">航空提單號碼</div></div></div></div>'+
    '<div id="sl-awb-err" class="err-msg hidden"><i class="ti ti-alert-circle"></i><span id="sl-awb-err-m"></span></div>'+
    '<button class="btn-p" onclick="slGoPreview()"><i class="ti ti-barcode"></i>建立條碼並預覽</button>'+
    '<button class="btn-s" onclick="renderSealLabel()"><i class="ti ti-arrow-left"></i>返回</button>';
};
window.slGoPreview=function(){
  var awb=val('f-awb').trim();if(!awb){showErr('sl-awb-err','sl-awb-err-m','請填寫 AWB No.');return;}
  var rows=SL.sel.map(function(i){return SEAL_REC[i];});
  var invs=[...new Set(rows.map(function(r){return r.invoice;}))];
  var bv='AWB:'+awb.replace(/-/g,'')+'|INV:'+invs.join('+');
  SL.bv=bv;goStep(3);
  el('sub-body').innerHTML='<div class="preview-box"><div class="preview-lbl"><i class="ti ti-eye" style="font-size:13px;"></i>條碼預覽 — 請確認後執行列印</div>'+
    '<div class="bc-area"><svg id="sl-bc" width="260" height="70" viewBox="0 0 260 70" xmlns="http://www.w3.org/2000/svg"></svg><div class="bc-no" id="sl-bc-n"></div></div>'+
    '<div class="info-grid" id="sl-ig"></div></div>'+
    '<button class="btn-p" onclick="slPrint()"><i class="ti ti-printer"></i>確認無誤，執行列印</button>'+
    '<button class="btn-s" onclick="slGoAWB()"><i class="ti ti-arrow-left"></i>返回修改 AWB</button>';
  setTimeout(function(){
    renderBarcode('sl-bc','sl-bc-n',bv);
    el('sl-ig').innerHTML=infoGrid([
      {l:'AWB No.',v:awb,full:true},
      {l:'選取筆數',v:SL.sel.length+'筆'},
      {l:'Invoice',v:invs.join(', '),full:true},
      {l:'Line',v:rows.map(function(r){return r.line;}).join(', ')},
      {l:'PN',v:rows.map(function(r){return r.pn;}).join(', ')}
    ]);
  },50);
};
window.slPrint=function(){
  goStep(4);var bv=SL.bv;
  el('sub-body').innerHTML='<div class="success-box"><i class="ti ti-circle-check"></i><p>列印指令已送出！</p><span>共 '+SL.sel.length+' 筆，條碼已傳送至印表機</span></div>'+
    '<div class="preview-box"><div class="preview-lbl">本次條碼內容</div><div class="bc-area"><svg id="sl-done-bc" width="260" height="70" viewBox="0 0 260 70" xmlns="http://www.w3.org/2000/svg"></svg><div class="bc-no" id="sl-done-n"></div></div></div>'+
    '<button class="btn-p" onclick="renderSealLabel()"><i class="ti ti-refresh"></i>返回清單繼續列印</button>'+
    '<button class="btn-s" onclick="goToHome()"><i class="ti ti-home"></i>返回首頁</button>';
  setTimeout(function(){renderBarcode('sl-done-bc','sl-done-n',bv);},50);
};

var PI={files:[]};
function renderPhotoImport(){
  setHdr('影像拍攝作業 — 進口貨','ti-camera',true);
  setSteps([{icon:'ti-forms',label:'資料輸入'},{icon:'ti-upload',label:'影像上傳'},{icon:'ti-check',label:'完成'}],1);
  PI.files=[];
  var declOpts=[...new Set(CUSTOMS.map(function(r){return r.decl;}))];
  var mswbOpts=[...new Set(CUSTOMS.map(function(r){return r.mswb;}))];
  var hawbOpts=[...new Set(CUSTOMS.map(function(r){return r.hawb;}))];
  var poOpts=Object.keys(PO_IMP);
  var mkOpts=function(arr){return arr.map(function(v){return'<option value="'+v+'">'+v+'</option>';}).join('');};
  el('sub-body').innerHTML=

      '<div class="group-box"><div class="group-lbl"><i class="ti ti-building-warehouse"></i>MSWB 主提單</div><div class="field" style="margin-bottom:0"><select id="f-mswb" onchange="piSync(\'mswb\')"><option value="">— 請選擇 MSWB —</option>'+mkOpts(mswbOpts)+'</select></div></div>'+
      '<div class="group-box" style="margin-bottom:0"><div class="group-lbl"><i class="ti ti-plane-arrival"></i>HAWB 分提單</div><div class="field" style="margin-bottom:0"><select id="f-hawb" onchange="piSync(\'hawb\')"><option value="">— 請選擇 HAWB —</option>'+mkOpts(hawbOpts)+'</select></div></div>'+
    '</div></div>'+
    '<div class="card"><div class="card-hd"><div class="card-hd-l"><i class="ti ti-shopping-cart"></i>採購資訊（連動下拉）</div></div><div class="card-bd">'+

      '<div class="row2"><div class="field"><label>項次<span class="req">*</span></label><select id="f-item" onchange="piPNs()"><option value="">— 請先選採購單 —</option></select></div>'+
      '<div class="field"><label>報關/系統件號<span class="req">*</span></label><select id="f-pn"><option value="">— 請先選項次 —</option></select></div></div>'+
    '</div></div>'+
    '<div id="pi-err" class="err-msg hidden"><i class="ti ti-alert-circle"></i><span id="pi-err-m"></span></div>'+
    '<button class="btn-p" onclick="piSubmit()"><i class="ti ti-check"></i>確認新增，前往影像上傳</button>';
  el('f-arrive').value=today;
}
window.piSync=function(src){
  var d=val('f-decl'),m=val('f-mswb'),h=val('f-hawb'),found=null;
  if(src==='decl'&&d)found=CUSTOMS.find(function(r){return r.decl===d;});
  else if(src==='hawb'&&h)found=CUSTOMS.find(function(r){return r.hawb===h;});
  else if(src==='mswb'&&m){
    var ms=CUSTOMS.filter(function(r){return r.mswb===m;});
    if(ms.length===1)found=ms[0];
    else if(ms.length>1){
      var hs=el('f-hawb');hs.innerHTML='<option value="">— 請選擇 HAWB —</option>';
      ms.forEach(function(r){hs.innerHTML+='<option value="'+r.hawb+'">'+r.hawb+'</option>';});
      el('f-decl').value='';return;
    }
  }
  if(found){
    el('f-decl').value=found.decl;el('f-mswb').value=found.mswb;el('f-hawb').value=found.hawb;
    ['decl','mswb','hawb'].forEach(function(k){
      var e=el('f-'+k);
      e.style.background=k===src?'':'var(--local-bg)';e.style.borderColor=k===src?'':'var(--local-bd)';e.style.color=k===src?'':'var(--local-txt)';
    });
  }
};
window.piItems=function(){var po=val('f-po');setOpts('f-item',po&&PO_IMP[po]?PO_IMP[po].items:[],po?'— 請選擇項次 —':'— 請先選採購單 —');setOpts('f-pn',[],'— 請先選項次 —');};
window.piPNs=function(){var po=val('f-po'),it=val('f-item');var pns=po&&it&&PO_IMP[po]&&PO_IMP[po].pns[it]?PO_IMP[po].pns[it]:[];setOpts('f-pn',pns,pns.length?'— 請選擇件號 —':'— 請先選項次 —');};
window.piSubmit=function(){
  var ar=val('f-arrive'),d=val('f-decl'),m=val('f-mswb'),h=val('f-hawb'),po=val('f-po'),it=val('f-item'),pn=val('f-pn');
  if(!ar){showErr('pi-err','pi-err-m','請填寫到貨日');return;}
  if(!d||!m||!h){showErr('pi-err','pi-err-m','請選擇報關資訊任一欄位');return;}
  if(!po||!it||!pn){showErr('pi-err','pi-err-m','請選擇採購單號、項次及件號');return;}
  hideErr('pi-err');
  PI.data={arrive:ar,decl:d,mswb:m,hawb:h,po:po,item:it,pn:pn};
  PI.files=[];goStep(2);
  el('sub-body').innerHTML=uploadHTML('pi','piAddF','piRmF',PI.data,'pi-up-err','pi-up-err-m','piUpload','renderPhotoImport');
  el('pi-file-input').addEventListener('change',function(){piAddF(this.files);this.value='';});
};
window.piAddF=function(nf){addFiles(nf,PI.files,'pi-file-list','piRmF','pi-up-err','pi-up-err-m');};
window.piRmF=function(i){PI.files.splice(i,1);renderFiles('pi-file-list',PI.files,'piRmF');};
window.piUpload=function(){
  if(!PI.files.length){showErr('pi-up-err','pi-up-err-m','請至少上傳一個檔案');return;}
  goStep(3);el('sub-body').innerHTML=doneHTML(PI.files.length,'renderPhotoImport','open-label-import');
};

window.aiSync=function(src){
  var d=val('f-ai-decl'),m=val('f-ai-mawb'),h=val('f-ai-hawb'),found=null;
  if(src==='decl'&&d)found=CUSTOMS.find(function(r){return r.decl===d;});
  else if(src==='hawb'&&h)found=CUSTOMS.find(function(r){return r.hawb===h;});
  else if(src==='mawb'&&m){
    var ms=CUSTOMS.filter(function(r){return r.mswb===m;});
    if(ms.length===1){found=ms[0];}
    else if(ms.length>1){
      var hs=el('f-ai-hawb');hs.innerHTML='<option value="">— 請選擇 HAWB 分提單 —</option>';
      ms.forEach(function(r){hs.innerHTML+='<option value="'+r.hawb+'">'+r.hawb+'</option>';});
      el('f-ai-decl').value='';
      ['decl','mawb','hawb'].forEach(function(k){var e=el('f-ai-'+k);if(e){e.style.background='';e.style.borderColor='';e.style.color='';}});
      return;
    }
  }
  if(found){
    el('f-ai-decl').value=found.decl;el('f-ai-mawb').value=found.mswb;el('f-ai-hawb').value=found.hawb;
    ['decl','mawb','hawb'].forEach(function(k){var e=el('f-ai-'+k);if(!e)return;e.style.background=k===src?'':'var(--local-bg)';e.style.borderColor=k===src?'':'var(--local-bd)';e.style.color=k===src?'':'var(--local-txt)';});
  }
};

window.aiItems=function(){
  var po=val('f-ai-po'),items=po&&AI_DATA[po]?Object.keys(AI_DATA[po].items):[];
  var s=el('f-ai-item');s.innerHTML='<option value="">'+(po?'— 請選擇項次 —':'— 請先選採購單 —')+'</option>';
  items.forEach(function(v){s.innerHTML+='<option value="'+v+'">'+v+'</option>';});
  el('f-ai-pn').innerHTML='<option value="">— 請先選項次 —</option>';
  aiResetStep2();aiResetG3();
};
window.aiPNs=function(){
  var po=val('f-ai-po'),it=val('f-ai-item'),pns=po&&it&&AI_DATA[po]&&AI_DATA[po].items[it]?AI_DATA[po].items[it].pns:[];
  var s=el('f-ai-pn');s.innerHTML='<option value="">'+(it?'— 請選擇報關件號 —':'— 請先選項次 —')+'</option>';
  pns.forEach(function(v){s.innerHTML+='<option value="'+v+'">'+v+'</option>';});
  aiResetStep2();aiResetG3();
};
window.aiLots=function(){
  var po=val('f-ai-po'),it=val('f-ai-item'),pn=val('f-ai-pn');
  aiResetStep2();aiResetG3();
  if(!po||!it||!pn)return;
  var lots=AI_DATA[po]&&AI_DATA[po].items[it]&&AI_DATA[po].items[it].lots[pn]?AI_DATA[po].items[it].lots[pn]:[];
  AI.lots=lots;
  if(!lots.length){el('ai-step2-wrap').innerHTML+='<div class="not-found" style="margin-top:8px;"><i class="ti ti-alert-triangle"></i>查無對應批次記錄</div>';return;}
  // Populate Commit Date dropdown
  var cdSel=el('f-ai-cd');cdSel.innerHTML='<option value="">— 請選擇 Commit Date —</option>';
  var seen={};
  lots.forEach(function(l){if(!seen[l.commitDate]){cdSel.innerHTML+='<option value="'+l.commitDate+'">'+l.commitDate+'</option>';seen[l.commitDate]=true;}});
  el('f-ai-trx').innerHTML='<option value="">— 自動帶出 —</option>';
  show('ai-step2-wrap');
};

// ── 步驟2：Commit Date ↔ TRX NO ──
window.aiSyncTrx=function(src){
  if(!AI.lots||!AI.lots.length)return;
  var cd=val('f-ai-cd'),trx=val('f-ai-trx');
  var matchLots=[];
  if(src==='cd'&&cd){
    matchLots=AI.lots.filter(function(l){return l.commitDate===cd;});
    // populate TRX dropdown
    var trxSel=el('f-ai-trx');trxSel.innerHTML='<option value="">— 請選擇 TRX NO —</option>';
    var seen={};matchLots.forEach(function(l){if(!seen[l.trxNo]){trxSel.innerHTML+='<option value="'+l.trxNo+'">'+l.trxNo+'</option>';seen[l.trxNo]=true;}});
    trxSel.style.background='var(--local-bg)';trxSel.style.borderColor='var(--local-bd)';
    aiResetG3();
  } else if(src==='trx'&&trx){
    var cdVal=val('f-ai-cd');
    matchLots=AI.lots.filter(function(l){return l.trxNo===trx&&(!cdVal||l.commitDate===cdVal);});
    if(!matchLots.length)matchLots=AI.lots.filter(function(l){return l.trxNo===trx;});
    aiPopulateG3(matchLots);
  }
  if(src==='cd'&&!cd){el('f-ai-trx').innerHTML='<option value="">— 自動帶出 —</option>';el('f-ai-trx').style.background='';el('f-ai-trx').style.borderColor='';aiResetG3();}
};

function aiPopulateG3(lots){
  var rs=el('f-ai-recv');if(!rs)return;
  rs.innerHTML='<option value="">— 請選擇實際接收件號 —</option>';
  lots.forEach(function(l){rs.innerHTML+='<option value="'+l.recvNo+'" data-sn="'+l.sn+'" data-grn="'+l.grn+'">'+l.recvNo+'</option>';});
  el('f-ai-sn').value='';el('f-ai-grn').value='';
  show('ai-g3-card');
}
window.aiRecvChange=function(){
  var rs=el('f-ai-recv');if(!rs)return;
  var opt=rs.options[rs.selectedIndex];
  el('f-ai-sn').value=opt?opt.getAttribute('data-sn')||'':'';
  el('f-ai-grn').value=opt?opt.getAttribute('data-grn')||'':'';
};
function aiResetStep2(){hide('ai-step2-wrap');var s=el('ai-step2-wrap');if(s){el('f-ai-cd').innerHTML='<option value="">— 請選擇 —</option>';el('f-ai-trx').innerHTML='<option value="">— 自動帶出 —</option>';el('f-ai-trx').style.background='';el('f-ai-trx').style.borderColor='';}}
function aiResetG3(){var rs=el('f-ai-recv');if(rs)rs.innerHTML='<option value="">— 請先完成群組二 —</option>';var sn=el('f-ai-sn');if(sn)sn.value='';var grn=el('f-ai-grn');if(grn)grn.value='';hide('ai-g3-card');AI.lots=AI.lots||[];}

// ── 送出 → 預覽 ──
window.aiSubmit=function(){
  var arrive=val('f-ai-arrive'),d=val('f-ai-decl'),m=val('f-ai-mawb'),h=val('f-ai-hawb');
  var po=val('f-ai-po'),it=val('f-ai-item'),pn=val('f-ai-pn');
  var cd=val('f-ai-cd'),trx=val('f-ai-trx'),recv=val('f-ai-recv');
  if(!arrive){showErr('ai-err','ai-err-m','請填寫到貨日期');return;}
  if(!d||!m||!h){showErr('ai-err','ai-err-m','請完成群組一報關資訊');return;}
  if(!po||!it||!pn){showErr('ai-err','ai-err-m','請完成群組二：採購單號、項次及報關件號');return;}
  if(!cd){showErr('ai-err','ai-err-m','請選擇 Commit Date');return;}
  if(!recv){showErr('ai-err','ai-err-m','請選擇實際接收件號');return;}
  hideErr('ai-err');
  var sn=val('f-ai-sn'),grn=val('f-ai-grn');
  AI.rec={arrive:arrive,decl:d,mawb:m,hawb:h,po:po,item:it,pn:pn,cd:cd,trx:trx||'—',recv:recv,sn:sn||'—',grn:grn||'—'};
  var bv='DATE:'+arrive.replace(/-/g,'')+'|DECL:'+d.replace(/[^A-Z0-9]/gi,'')+'|PO:'+po.replace(/[^A-Z0-9]/gi,'')+'|RECV:'+recv.replace(/[^A-Z0-9]/gi,'');
  AI.bv=bv;goStep(2);
  el('sub-body').innerHTML=
    '<div class="preview-box"><div class="preview-lbl"><i class="ti ti-eye" style="font-size:13px;"></i>條碼預覽 — 請確認內容後執行列印</div>'+
      '<div class="bc-area"><svg id="ai-bc" width="260" height="70" viewBox="0 0 260 70" xmlns="http://www.w3.org/2000/svg"></svg><div class="bc-no" id="ai-bc-n"></div></div>'+
      '<div class="info-grid" id="ai-ig"></div>'+
    '</div>'+
    '<button class="btn-p" onclick="aiPrint()"><i class="ti ti-printer"></i>確認無誤，執行列印</button>'+
    '<button class="btn-s" onclick="renderArchImport()"><i class="ti ti-arrow-left"></i>返回修改資料</button>';
  setTimeout(function(){
    renderBarcode('ai-bc','ai-bc-n',bv);
    var r=AI.rec;
    el('ai-ig').innerHTML=infoGrid([
      {l:'到貨日期',v:r.arrive,full:true},
      {l:'報單號碼',v:r.decl,full:true},
      {l:'MAWB 主提單',v:r.mawb},{l:'HAWB 分提單',v:r.hawb},
      {l:'採購單號',v:r.po,full:true},
      {l:'項次',v:r.item},{l:'報關件號',v:r.pn},
      {l:'Commit Date',v:r.cd},{l:'TRX NO',v:r.trx},
      {l:'實際接收件號',v:r.recv,full:true},
      {l:'SN',v:r.sn},{l:'GRN',v:r.grn}
    ]);
  },50);
};
window.aiPrint=function(){
  goStep(3);var bv=AI.bv,r=AI.rec;
  el('sub-body').innerHTML=
    '<div class="success-box"><i class="ti ti-circle-check"></i><p>列印指令已送出！</p><span>條碼標籤已傳送至印表機</span></div>'+
    '<div class="preview-box"><div class="preview-lbl">本次列印條碼內容</div>'+
      '<div class="bc-area"><svg id="ai-done-bc" width="260" height="70" viewBox="0 0 260 70" xmlns="http://www.w3.org/2000/svg"></svg><div class="bc-no" id="ai-done-n"></div></div>'+
      '<div class="info-grid" style="margin-top:10px;">'+infoGrid([
        {l:'到貨日期',v:r.arrive,full:true},{l:'報單號碼',v:r.decl,full:true},
        {l:'MAWB',v:r.mawb},{l:'HAWB',v:r.hawb},
        {l:'採購單號',v:r.po,full:true},{l:'項次',v:r.item},{l:'報關件號',v:r.pn},
        {l:'Commit Date',v:r.cd},{l:'TRX NO',v:r.trx},
        {l:'實際接收件號',v:r.recv,full:true},{l:'SN',v:r.sn},{l:'GRN',v:r.grn}
      ])+'</div>'+
    '</div>'+
    '<button class="btn-p" onclick="renderArchImport()"><i class="ti ti-refresh"></i>繼續製作下一張</button>'+
    '<button class="btn-s" onclick="navBack()"><i class="ti ti-arrow-left"></i>返回歸檔標籤選單</button>';
  setTimeout(function(){renderBarcode('ai-done-bc','ai-done-n',bv);},50);
};

// ══════════════════════════════════════════════
// SHARED UPLOAD & DONE HTML
// ══════════════════════════════════════════════
function recSumRows(data){
  return Object.keys(data).map(function(k){
    var labels={date:'拍攝日',invoice:'Invoice NO',line:'Line',pn:'PN',sn:'SN',note:'Note',arrive:'到貨日',decl:'報單號碼',mswb:'MSWB 主提單',hawb:'HAWB 分提單',po:'採購單號',item:'項次',shop:'SHOP',wo:'Package ID / WO',mode:'類型',mawb:'MAWB 主提單',tx:'TX 項次',to:'To 單號'};
    return'<tr><td>'+(labels[k]||k)+'</td><td>'+(data[k]||'—')+'</td></tr>';
  }).join('');
}
function uploadHTML(pfx,addFn,rmFn,data,errId,errMid,uploadFn,backFn){
  var rows=recSumRows(data);
  return '<div class="rec-sum"><table>'+rows+'</table></div>'+
    '<div class="card"><div class="card-hd"><div class="card-hd-l"><i class="ti ti-upload"></i>影像上傳</div></div><div class="card-bd">'+
      '<div class="upload-zone" onclick="document.getElementById(\''+pfx+'-file-input\').click()">'+
        '<i class="ti ti-photo-up"></i><p>點擊選擇或拖曳影像至此</p><span>支援照片與影片，單檔最大為 10MB</span>'+
      '</div>'+
      '<input type="file" id="'+pfx+'-file-input" multiple accept="image/*,video/*" style="display:none">'+
      '<div class="file-list" id="'+pfx+'-file-list"></div>'+
      '<div id="'+errId+'" class="err-msg hidden" style="margin-top:8px;"><i class="ti ti-alert-circle"></i><span id="'+errMid+'"></span></div>'+
    '</div></div>'+
    '<button class="btn-p" onclick="'+uploadFn+'()"><i class="ti ti-cloud-upload"></i>確認上傳完成</button>'+
    '<button class="btn-s" onclick="'+backFn+'()"><i class="ti ti-arrow-left"></i>返回修改資料</button>';
}
function doneHTML(n,nextFn,labelScreen){
  return '<div class="success-box"><i class="ti ti-circle-check"></i><p>上傳完成！</p><span>已上傳 '+n+' 個檔案，資料已成功儲存。</span></div>'+
    '<button class="btn-p" onclick="'+nextFn+'()"><i class="ti ti-plus"></i>繼續輸入下一筆</button>'+
    '<button class="btn-s" onclick="nav(\''+labelScreen+'\')"><i class="ti ti-printer"></i>執行文件歸檔標籤印製</button>';
}
function addFiles(nf,arr,listId,rmFn,errId,errMid){
  var max=10*1024*1024;
  for(var i=0;i<nf.length;i++){
    if(nf[i].size>max){showErr(errId,errMid,'「'+nf[i].name+'」超過 10MB 限制，已略過');continue;}
    arr.push(nf[i]);
  }
  renderFiles(listId,arr,rmFn);
  if(arr.length)hideErr(errId);
}
</script>
